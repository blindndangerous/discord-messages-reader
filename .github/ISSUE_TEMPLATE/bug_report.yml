name: Bug Report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Fill in as much as you can — the more detail you provide, the faster we can track it down.

  - type: dropdown
    id: discord_build
    attributes:
      label: Discord build
      description: >
        Not sure which build you have? Right-click the Discord icon in your system tray and look at the title,
        or check Task Manager — the process will be named Discord.exe, DiscordPTB.exe, or DiscordCanary.exe.
      options:
        - Discord (stable)
        - Discord PTB
        - Discord Canary
    validations:
      required: true

  - type: input
    id: nvda_version
    attributes:
      label: NVDA version
      description: >
        Press NVDA+N to open the NVDA menu, then go to Help > About NVDA.
        The version number is at the top of the dialog (e.g. 2024.1).
      placeholder: "e.g. 2024.1"
    validations:
      required: true

  - type: input
    id: addon_version
    attributes:
      label: Add-on version
      description: >
        Press NVDA+N to open the NVDA menu, then go to Tools > Manage Add-ons.
        Find "Discord Incoming Messages Reader" in the list and check the Version column.
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Discord and navigate to a channel
        2. Have someone send a message
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: NVDA log
      description: >
        The log often contains the exact error. To get it:

        1. Set the log level to Debug: NVDA menu (NVDA+N) > Preferences > Settings > General > Logging level > Debug > OK.
        2. Restart NVDA.
        3. Reproduce the problem.
        4. Open the log: NVDA menu > Tools > View Log.
        5. Select all (Ctrl+A), copy (Ctrl+C), and paste it here.

        You can set the log level back to Info after you have collected the log.
      render: text
