name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff — lint
        run: uv run ruff check .
      - name: Ruff — format check (tests only)
        run: uv run ruff format tests/ --check

  security:
    name: bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Bandit — security scan
        run: uv run bandit -r appModules/ -c pyproject.toml
      - name: pip-audit — dependency CVE scan
        run: uv run pip-audit

  test:
    name: pytest (Python 3.13)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Pytest — test suite with coverage
        run: uv run pytest --tb=short
